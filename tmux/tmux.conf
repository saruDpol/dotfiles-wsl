##### ─────────────────────────────────────────────────────────────
##### Terminal & capabilities
##### ─────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:RGB'
set -g mouse on

##### IDE grid helper

bind-key -n M-i command-prompt -p "IDE panes:" \
  "run-shell '~/.config/tmux/scripts/ide.sh %%'"

##### ─────────────────────────────────────────────────────────────
##### NO PREFIX
##### ─────────────────────────────────────────────────────────────

unbind C-b
set -g prefix None
set -g repeat-time 0
set -g focus-events on
set -sg escape-time 10

##### ─────────────────────────────────────────────────────────────
##### General behavior
##### ─────────────────────────────────────────────────────────────

# Vim-style keys in copy mode
setw -g mode-keys vi

# Scrollback
set -g history-limit 64096

# Window titles
set -g set-titles on
set -g set-titles-string "#T"

##### ─────────────────────────────────────────────────────────────
##### IMPORTANT: Do NOT steal Alt + hjkl
##### (Neovim owns these)
##### ─────────────────────────────────────────────────────────────

unbind -n M-h
unbind -n M-j
unbind -n M-k
unbind -n M-l

##### ─────────────────────────────────────────────────────────────
##### Pane management (tmux only)
##### ─────────────────────────────────────────────────────────────

# Split panes (repeatable)
bind-key -n -r M-v split-window -h \; select-pane -R
bind-key -n -r M-s split-window -v \; select-pane -D

# Navigate panes (Alt + ARROWS only)
bind-key -n M-Left  select-pane -L
bind-key -n M-Down  select-pane -D
bind-key -n M-Up    select-pane -U
bind-key -n M-Right select-pane -R

# Close current pane
bind-key -n M-q kill-pane

##### ─────────────────────────────────────────────────────────────
##### Tabs / windows (tmux only)
##### ─────────────────────────────────────────────────────────────

# New tab (open in current directory)
bind-key -n -r M-c new-window -c "#{pane_current_path}"

# Navigate tabs
bind-key -n -r M-n next-window
bind-key -n -r M-m previous-window

# Direct tab access
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4

# Close tab
bind-key -n M-S-q kill-window

##### ─────────────────────────────────────────────────────────────
##### Window reordering
##### ─────────────────────────────────────────────────────────────

bind-key -n M-S-Left  swap-window -t -1 \; previous-window
bind-key -n M-S-Right swap-window -t +1 \; next-window

##### ─────────────────────────────────────────────────────────────
##### Look & feel (base only)
##### ─────────────────────────────────────────────────────────────

set -g window-style fg=default,bg=default
set -g window-active-style fg=default,bg=default

set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour166

##### ─────────────────────────────────────────────────────────────
##### OS-specific configuration
##### ─────────────────────────────────────────────────────────────

if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

##### ─────────────────────────────────────────────────────────────
##### Theme & status line
##### ─────────────────────────────────────────────────────────────

source ~/.config/tmux/theme.conf
source ~/.config/tmux/statusline.conf
source ~/.config/tmux/utility.conf

##### ─────────────────────────────────────────────────────────────
##### Plugins
##### ─────────────────────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
