# vim: ft=tmux

##### Modes / messages
set -g mode-style "fg=#e5e5e5,bg=#32302f"

set -g message-style "fg=#e5e5e5,bg=#32302f"
set -g message-command-style "fg=#e5e5e5,bg=#32302f"

##### Pane borders
set -g pane-border-style "fg=#063642"
set -g pane-active-border-style "fg=#ba9132"

##### Status bar base
set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#32302f"
set -g status-bg "#32302f"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

##### LEFT — unchanged structure, same shapes

set -g status-left "#[fg=#012b38,bg=#e5e5e5,nobold] #S:#I.#P \
#[fg=#e5e5e5,bg=#93a1a1,nobold,nounderscore,noitalics]\
#[fg=#012b38,bg=#93a1a1,bold] #(whoami) \
#[fg=#93a1a1,bg=#32302f]"

##### RIGHT — UNCHANGED (as requested)

# set -g status-right "#[fg=#586e75,bg=#32302f,nobold,nounderscore,noitalics]\
# #[fg=#93a1a1,bg=#586e75]\
# #[fg=#657b83,bg=#586e75,nobold,nounderscore,noitalics]\
# #[fg=#93a1a1,bg=#657b83]\
# #[fg=#93a1a1,bg=#657b83,nobold,nounderscore,noitalics]\
# #[fg=#012b38,bg=#93a1a1,nobold] #h "

set -g status-right "#[fg=#3a1f12,bg=#32302f,nobold,nounderscore,noitalics]\
#[fg=#e5e5e5,bg=#3a1f12]\
#[fg=#7a3215,bg=#3a1f12,nobold,nounderscore,noitalics]\
#[fg=#e5e5e5,bg=#7a3215]\
#[fg=#c74b16,bg=#7a3215,nobold,nounderscore,noitalics]\
#[fg=#ffffff,bg=#c74b16,nobold] #h "

##### WINDOW LIST

setw -g window-status-activity-style "underscore,fg=#839496,bg=#32302f"
setw -g window-status-separator ""

# Inactive windows — FULL BLACK text
setw -g window-status-style "NONE,fg=#93a1a1,bg=#32302f"
setw -g window-status-format \
'#[fg=#32302f,bg=#32302f]#[fg=#93a1a1] #I | #{b:pane_current_path} #[fg=#32302f,bg=#32302f,nobold,nounderscore,noitalics]'

# Active window — GOLD bg, WHITE text
setw -g window-status-current-format \
'#[fg=#32302f,bg=#ba9132]#[fg=#ffffff,bg=#ba9132,nobold] #I #[fg=#32302f,bg=#ba9132]| #[fg=#ffffff]#{b:pane_current_path} #[fg=#ba9132,bg=#32302f,nobold]'
