# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Codex popup toggle (one session per directory)
# Open/reopen Codex popup
bind-key -n M-t run-shell '\
SESSION="codex-$(printf "%s" "#{pane_current_path}" | md5sum | cut -c1-8)"; \
tmux has-session -t "$SESSION" 2>/dev/null || \
tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "codex"; \
tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Close any open popup on the current client
bind-key -n M-x display-popup -C
